# ============================================================================
# Aplika.ai — docker-compose para despliegue en VPS IONOS
# Supabase corre como servicio gestionado (proyecto cloud nuevo de Aplika),
# por eso aquí solo levantamos la app Next.js. Postgres/Auth/Storage los provee
# Supabase. Si en el futuro quieres self-host de Supabase, se agrega aparte.
# ============================================================================
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: aplika-erp:latest
    container_name: aplika-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
