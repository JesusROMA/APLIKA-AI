<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:0.35;}}
</style>
</helmet>
<div style="font-family:'Plus Jakarta Sans',system-ui,sans-serif;">

<!-- Reloj flotante CDMX (escritorio) -->
<sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
  <div style="position:fixed;top:13px;left:22px;z-index:99;display:flex;align-items:center;gap:9px;background:rgba(10,48,88,0.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:6px 13px;transform:{{ navTransform }};transition:transform .4s cubic-bezier(.4,0,.2,1);">
    <span style="width:7px;height:7px;border-radius:50%;background:#4FA0E8;animation:pulseDot 2s ease-in-out infinite;"></span>
    <span style="font-size:13px;font-weight:600;color:#FFFFFF;letter-spacing:0.01em;">{{ time }}</span>
    <span style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.55);">CDMX</span>
  </div>
</sc-if>

<!-- Barra flotante (pill) -->
<div style="position:fixed;top:11px;left:0;right:0;z-index:100;display:flex;justify-content:center;padding:0 16px;pointer-events:none;transform:{{ navTransform }};opacity:{{ navOpacity }};transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .3s ease;">
  <nav style="pointer-events:auto;display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;max-width:1060px;background:rgba(10,48,88,0.86);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.1);border-radius:999px;padding:5px 6px 5px 16px;box-shadow:{{ navShadow }};">

    <a href="Aplika.ai.dc.html" style="display:flex;align-items:center;gap:9px;text-decoration:none;flex:none;">
      <span style="display:grid;grid-template-columns:1fr 1fr;gap:2.5px;width:21px;height:21px;">
        <span style="background:#FFFFFF;border-radius:3.5px;"></span><span style="background:#B5D4F4;border-radius:3.5px;"></span><span style="background:#4FA0E8;border-radius:3.5px;"></span><span style="background:#FFFFFF;border-radius:3.5px;"></span>
      </span>
      <span style="font-size:17px;font-weight:700;letter-spacing:-0.01em;color:#FFFFFF;">aplika<span style="color:#6FB3EC;">.ai</span></span>
    </a>

    <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;align-items:center;gap:3px;">
        <sc-for list="{{ navLinks }}" as="item" hint-placeholder-count="5">
          <a href="{{ item.href }}" style="padding:7px 13px;border-radius:999px;text-decoration:none;font-size:13.5px;font-weight:500;white-space:nowrap;transition:background .2s,color .2s;background:{{ item.bg }};color:{{ item.color }};" style-hover="background:rgba(255,255,255,0.13);color:#FFFFFF;">{{ item.label }}</a>
        </sc-for>
      </div>
    </sc-if>

    <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;align-items:center;gap:8px;flex:none;">
        <a href="Login.dc.html" style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.82);text-decoration:none;padding:6px 11px;white-space:nowrap;" style-hover="color:#FFFFFF;">Iniciar sesión</a>
        <a href="Agenda-demo.dc.html" style="display:inline-flex;align-items:center;background:#378ADD;color:#FFFFFF;font-size:13px;font-weight:600;padding:8px 15px;border-radius:999px;text-decoration:none;white-space:nowrap;" style-hover="background:#4F9AE6;">Agendar demo</a>
      </div>
    </sc-if>

    <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
      <button onClick="{{ toggleMenu }}" aria-label="Menú" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:rgba(255,255,255,0.1);border:none;border-radius:999px;cursor:pointer;color:#FFFFFF;flex:none;">
        <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M6 6 18 18M18 6 6 18"></path></svg></sc-if>
        <sc-if value="{{ menuClosed }}" hint-placeholder-val="{{ true }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"></path></svg></sc-if>
      </button>
    </sc-if>
  </nav>
</div>

<!-- Menú móvil -->
<sc-if value="{{ showMobileMenu }}" hint-placeholder-val="{{ false }}">
  <div style="position:fixed;top:62px;left:16px;right:16px;z-index:99;background:rgba(10,48,88,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.12);border-radius:22px;padding:14px;display:flex;flex-direction:column;gap:4px;box-shadow:0 24px 50px -18px rgba(4,28,53,0.6);">
    <sc-for list="{{ navLinks }}" as="item" hint-placeholder-count="5">
      <a href="{{ item.href }}" onClick="{{ closeMenu }}" style="padding:13px 16px;border-radius:14px;text-decoration:none;font-size:16px;font-weight:500;background:{{ item.bg }};color:{{ item.color }};">{{ item.label }}</a>
    </sc-for>
    <div style="height:1px;background:rgba(255,255,255,0.1);margin:8px 0;"></div>
    <a href="Login.dc.html" onClick="{{ closeMenu }}" style="padding:13px 16px;border-radius:14px;text-decoration:none;font-size:16px;font-weight:500;color:rgba(255,255,255,0.82);">Iniciar sesión</a>
    <a href="Agenda-demo.dc.html" onClick="{{ closeMenu }}" style="display:inline-flex;align-items:center;justify-content:center;background:#378ADD;color:#FFFFFF;font-size:16px;font-weight:600;padding:14px 18px;border-radius:14px;text-decoration:none;margin-top:4px;">Agendar demo</a>
  </div>
</sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;inicio&quot;,&quot;servicios&quot;,&quot;como&quot;,&quot;industrias&quot;,&quot;precios&quot;,&quot;sobre&quot;],&quot;default&quot;:&quot;inicio&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = {
    time: '',
    scrolled: false,
    hidden: false,
    mobile: (typeof window !== 'undefined' ? window.innerWidth < 960 : false),
    menuOpen: false,
    lang: 'ES'
  };

  fmt() {
    try {
      return new Date().toLocaleTimeString('es-MX', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Mexico_City' });
    } catch (e) {
      return new Date().toLocaleTimeString('es-MX', { hour: 'numeric', minute: '2-digit', hour12: true });
    }
  }

  componentDidMount() {
    this._onScroll = () => {
      // Header fijo: nunca se oculta; solo cambia la sombra al hacer scroll.
      const s = window.scrollY > 30;
      if (s !== this.state.scrolled) this.setState({ scrolled: s });
    };
    window.addEventListener('scroll', this._onScroll, { passive: true });

    this._onResize = () => {
      const m = window.innerWidth < 960;
      this.setState({ mobile: m, menuOpen: m ? this.state.menuOpen : false });
    };
    window.addEventListener('resize', this._onResize);

    this._tick = () => this.setState({ time: this.fmt() });
    this._tick();
    this._timer = setInterval(this._tick, 20000);
  }
  componentWillUnmount() {
    window.removeEventListener('scroll', this._onScroll);
    window.removeEventListener('resize', this._onResize);
    clearInterval(this._timer);
  }

  links = [
    { label: 'Inicio', href: 'Aplika.ai.dc.html', key: 'inicio' },
    { label: 'Producto', href: 'Servicios.dc.html', key: 'servicios' },
    { label: 'Cómo funciona', href: 'Como-funciona.dc.html', key: 'como' },
    { label: 'Industrias', href: 'Industrias.dc.html', key: 'industrias' },
    { label: 'Precios', href: 'Precios.dc.html', key: 'precios' },
    { label: 'Sobre nosotros', href: 'Sobre-nosotros.dc.html', key: 'sobre' }
  ];

  renderVals() {
    const active = this.props.active ?? 'inicio';
    const es = this.state.lang === 'ES';
    return {
      time: this.state.time,
      isDesktop: !this.state.mobile,
      isMobile: this.state.mobile,
      menuOpen: this.state.menuOpen,
      menuClosed: !this.state.menuOpen,
      showMobileMenu: this.state.mobile && this.state.menuOpen,
      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),
      closeMenu: () => this.setState({ menuOpen: false }),
      navTransform: 'translateY(0)',
      navOpacity: 1,
      navShadow: this.state.scrolled ? '0 14px 34px -16px rgba(4,28,53,0.55)' : '0 6px 20px -14px rgba(4,28,53,0.4)',
      navLinks: this.links.map(l => ({
        label: l.label, href: l.href,
        bg: active === l.key ? 'rgba(255,255,255,0.16)' : 'transparent',
        color: active === l.key ? '#FFFFFF' : 'rgba(255,255,255,0.75)'
      })),
      esBg: es ? '#FFFFFF' : 'transparent', esColor: es ? '#0C447C' : 'rgba(255,255,255,0.7)',
      enBg: es ? 'transparent' : '#FFFFFF', enColor: es ? 'rgba(255,255,255,0.7)' : '#0C447C',
      setEs: () => this.setState({ lang: 'ES' }),
      setEn: () => this.setState({ lang: 'EN' })
    };
  }
}
</script>
</body>
</html>
