<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<script src="./aplika-api.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{margin:0;background:#0C447C;}
input,button{font-family:inherit;}
::selection{background:#B5D4F4;color:#042C53;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</helmet>
<div style="font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100vh;display:flex;background:#FFFFFF;">

  <!-- Volver al inicio (arriba a la izquierda; color adaptado a escritorio/móvil) -->
  <a href="Aplika.ai.dc.html" style="position:fixed;top:18px;left:18px;z-index:60;display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:999px;font-size:13.5px;font-weight:600;text-decoration:none;background:{{ backBg }};border:1px solid {{ backBorder }};color:{{ backColor }};transition:opacity .2s,transform .2s;" style-hover="opacity:0.82;transform:translateX(-2px);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"></path></svg>Volver al inicio</a>

  <!-- Panel de marca (escritorio) -->
  <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
    <div style="flex:1 1 46%;position:relative;background:#0C447C;background-image:radial-gradient(rgba(255,255,255,0.06) 1.4px,transparent 1.4px);background-size:26px 26px;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:88px 48px 48px;">
      <div style="position:absolute;top:-90px;right:-70px;width:300px;height:300px;border-radius:60px;background:rgba(55,138,221,0.22);transform:rotate(18deg);"></div>
      <a href="Aplika.ai.dc.html" style="position:relative;display:flex;align-items:center;gap:10px;text-decoration:none;">
        <span style="display:grid;grid-template-columns:1fr 1fr;gap:3px;width:28px;height:28px;"><span style="background:#FFFFFF;border-radius:4px;"></span><span style="background:#B5D4F4;border-radius:4px;"></span><span style="background:#4FA0E8;border-radius:4px;"></span><span style="background:#FFFFFF;border-radius:4px;"></span></span>
        <span style="font-size:22px;font-weight:700;color:#FFFFFF;">aplika<span style="color:#6FB3EC;">.ai</span></span>
      </a>
      <div style="position:relative;">
        <h1 style="font-size:clamp(28px,3vw,38px);font-weight:700;line-height:1.1;letter-spacing:-0.02em;color:#FFFFFF;margin:0 0 28px;max-width:420px;text-wrap:balance;">Tu negocio, siempre a la mano</h1>
        <div style="display:flex;flex-direction:column;gap:16px;">
          <sc-for list="{{ perks }}" as="p" hint-placeholder-count="3">
            <div style="display:flex;align-items:center;gap:13px;"><span style="flex:none;display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;background:rgba(255,255,255,0.12);border-radius:10px;color:#9CC6F0;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="{{ p.d }}"></path></svg></span><span style="font-size:16px;color:rgba(255,255,255,0.9);">{{ p.label }}</span></div>
          </sc-for>
        </div>
      </div>
      <div style="position:relative;display:flex;align-items:center;gap:10px;">
        <span style="display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);"><span style="width:7px;height:7px;border-radius:50%;background:#4FA0E8;"></span>Soporte en México · Datos protegidos</span>
      </div>
    </div>
  </sc-if>

  <!-- Formulario -->
  <div style="flex:1 1 54%;display:flex;align-items:center;justify-content:center;padding:clamp(28px,5vw,56px) 24px;background:#FFFFFF;">
    <div style="width:100%;max-width:380px;">
      <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
        <a href="Aplika.ai.dc.html" style="display:flex;align-items:center;gap:9px;text-decoration:none;margin-bottom:32px;"><span style="display:grid;grid-template-columns:1fr 1fr;gap:2.5px;width:26px;height:26px;"><span style="background:#0C447C;border-radius:4px;"></span><span style="background:#B5D4F4;border-radius:4px;"></span><span style="background:#378ADD;border-radius:4px;"></span><span style="background:#0C447C;border-radius:4px;"></span></span><span style="font-size:20px;font-weight:700;color:#042C53;">aplika<span style="color:#378ADD;">.ai</span></span></a>
      </sc-if>

      <h2 style="font-size:clamp(24px,3vw,30px);font-weight:700;letter-spacing:-0.02em;color:#042C53;margin:0 0 8px;">Inicia sesión</h2>
      <p style="font-size:15px;color:rgba(4,44,83,0.6);margin:0 0 30px;">Entra al panel de tu negocio.</p>

      <!-- INTEGRACIÓN: onSubmit es un stub. // TODO backend: POST /api/auth/login { email, password } -->
      <form onSubmit="{{ onSubmit }}" novalidate="true" style="display:flex;flex-direction:column;gap:17px;">
        <div>
          <label for="l-email" style="display:block;font-size:13.5px;font-weight:600;color:#042C53;margin-bottom:7px;">Correo</label>
          <input id="l-email" type="email" value="{{ email }}" onInput="{{ onEmail }}" placeholder="tu@correo.com" style="width:100%;padding:13px 15px;border:1px solid #D8E6F5;border-radius:11px;font-size:16px;color:#042C53;background:#FFFFFF;outline:none;" style-focus="border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,0.18);"></input>
        </div>
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;"><label for="l-pass" style="font-size:13.5px;font-weight:600;color:#042C53;">Contraseña</label><a href="#" style="font-size:13px;font-weight:600;color:#378ADD;text-decoration:none;">¿Olvidaste tu contraseña?</a></div>
          <div style="position:relative;">
            <input id="l-pass" type="{{ passType }}" value="{{ password }}" onInput="{{ onPass }}" placeholder="Tu contraseña" style="width:100%;padding:13px 44px 13px 15px;border:1px solid #D8E6F5;border-radius:11px;font-size:16px;color:#042C53;background:#FFFFFF;outline:none;" style-focus="border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,0.18);"></input>
            <button type="button" onClick="{{ togglePass }}" aria-label="Mostrar contraseña" style="position:absolute;top:50%;right:8px;transform:translateY(-50%);display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:transparent;border:none;cursor:pointer;color:rgba(4,44,83,0.45);"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="{{ eyeIcon }}"></path></svg></button>
          </div>
        </div>
        <sc-if value="{{ error }}" hint-placeholder-val="{{ false }}"><p style="font-size:13px;color:#D24545;margin:-4px 0 0;display:flex;align-items:center;gap:7px;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v5M12 16v.01M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18Z"></path></svg>{{ error }}</p></sc-if>
        <label style="display:flex;align-items:center;gap:9px;cursor:pointer;font-size:14px;color:rgba(4,44,83,0.7);"><input type="checkbox" onChange="{{ onRemember }}" style="width:17px;height:17px;accent-color:#378ADD;cursor:pointer;"></input>Mantener sesión iniciada</label>
        <button type="button" onClick="{{ onSubmit }}" style="display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;background:#378ADD;color:#FFFFFF;font-size:16px;font-weight:600;padding:15px;border-radius:12px;border:none;cursor:pointer;line-height:1;margin-top:4px;" style-hover="background:#2C6FB5;">
          <sc-if value="{{ loading }}" hint-placeholder-val="{{ false }}"><span style="display:inline-block;width:17px;height:17px;border:2px solid rgba(255,255,255,0.45);border-top-color:#FFFFFF;border-radius:50%;animation:spin 0.7s linear infinite;"></span></sc-if>
          <span>{{ submitLabel }}</span>
        </button>
      </form>

      <div style="display:flex;align-items:center;gap:12px;margin:26px 0;"><span style="flex:1;height:1px;background:#E6F1FB;"></span><span style="font-size:12.5px;color:rgba(4,44,83,0.4);">o</span><span style="flex:1;height:1px;background:#E6F1FB;"></span></div>
      <p style="font-size:14.5px;color:rgba(4,44,83,0.6);text-align:center;margin:0 0 18px;">¿Aún no tienes cuenta? <a href="Agenda-demo.dc.html" style="font-weight:600;color:#378ADD;text-decoration:none;">Agenda una demo</a></p>
      <a href="Panel Super-admin.dc.html" style="display:flex;align-items:center;justify-content:center;gap:8px;font-size:13.5px;font-weight:600;color:rgba(4,44,83,0.55);text-decoration:none;" style-hover="color:#0C447C;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5 19 5V11C19 16 15.8 19.4 12 21.5C8.2 19.4 5 16 5 11V5Z"></path></svg>Acceso de administrador (Aplika)</a>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { email: '', password: '', showPass: false, remember: false, error: '', loading: false, width: (typeof window !== 'undefined' ? window.innerWidth : 1200) };

  componentDidMount() {
    this._r = () => this.setState({ width: window.innerWidth });
    window.addEventListener('resize', this._r);
  }
  componentWillUnmount() { window.removeEventListener('resize', this._r); }

  perks = [
    { label: 'Ventas, pedidos y CRM en un solo lugar', d: 'M6 7h12l-1 13H7zM9 7V5a3 3 0 0 1 6 0v2' },
    { label: 'Inventario al día por almacén', d: 'M12 3 3 7l9 4 9-4zM3 7v10l9 4 9-4V7M12 11v10' },
    { label: 'Agentes de IA y automatizaciones 24/7', d: 'M5 5h14v10H8l-3 3zM9 10h.01M13 10h.01M16 10h.01' }
  ];

  submit(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!this.state.email.trim() || !this.state.password.trim()) {
      this.setState({ error: 'Escribe tu correo y contraseña.' });
      return;
    }
    this.setState({ error: '', loading: true });
    // Conectado a POST /api/auth/login — redirige al panel según el rol.
    window.AplikaAPI.login(this.state.email.trim(), this.state.password).then(
      (r) => { window.location.href = r.redirect; },
      (err) => { this.setState({ error: (err && err.message) || 'No se pudo iniciar sesión.', loading: false }); }
    );
  }

  renderVals() {
    return {
      isDesktop: this.state.width >= 860,
      isMobile: this.state.width < 860,
      backColor: this.state.width >= 860 ? 'rgba(255,255,255,0.9)' : 'rgba(4,44,83,0.72)',
      backBg: this.state.width >= 860 ? 'rgba(255,255,255,0.1)' : '#F5F8FC',
      backBorder: this.state.width >= 860 ? 'rgba(255,255,255,0.18)' : '#E6F1FB',
      perks: this.perks,
      email: this.state.email, password: this.state.password,
      onEmail: (e) => this.setState({ email: e.target.value, error: '' }),
      onPass: (e) => this.setState({ password: e.target.value, error: '' }),
      onRemember: (e) => this.setState({ remember: e.target.checked }),
      passType: this.state.showPass ? 'text' : 'password',
      eyeIcon: this.state.showPass ? 'M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7ZM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z' : 'M3 3l18 18M10.6 10.7a3 3 0 0 0 4.2 4.2M9.4 5.2A9.4 9.4 0 0 1 12 5c6.5 0 10 7 10 7a16 16 0 0 1-3.4 4.1M6.1 6.2A16 16 0 0 0 2 12s3.5 7 10 7a9.3 9.3 0 0 0 3-.5',
      togglePass: () => this.setState(s => ({ showPass: !s.showPass })),
      error: this.state.error,
      loading: this.state.loading,
      onSubmit: (e) => this.submit(e),
      submitLabel: this.state.loading ? 'Entrando…' : 'Iniciar sesión'
    };
  }
}
</script>
</body>
</html>
